name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: pickly
          POSTGRES_PASSWORD: pickly_local
          POSTGRES_DB: pickly_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U pickly"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://pickly:pickly_local@localhost:5432/pickly_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pickly/database generate
      # الحزم تُستهلك من dist — بناء الحزم شرط للـtypecheck والاختبارات
      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm --filter @pickly/database migrate:deploy
      # الاختبارات التكاملية تعتمد على بيانات الseed (فروع وحسابات تجريبية)
      - run: pnpm db:seed
      - run: pnpm test
        env:
          OTP_DEV_FIXED_CODE: "1234"
          # جوال الأدمن واحد عبر كل ملفات الاختبار — حد الإنتاج (5/ساعة) يسقطها زوراً
          OTP_RATE_MAX_PER_WINDOW: "1000"
          SMS_PROVIDER: mock
          PAYMENT_PROVIDER: mock
          GEO_PROVIDER: mock
          PUSH_PROVIDER: mock
          PAYMENT_WEBHOOK_SECRET: dev-webhook-secret

  e2e:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_USER: pickly
          POSTGRES_PASSWORD: pickly_local
          POSTGRES_DB: pickly
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U pickly"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://pickly:pickly_local@localhost:5433/pickly
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret
      OTP_DEV_FIXED_CODE: "1234"
      SMS_PROVIDER: mock
      PAYMENT_PROVIDER: mock
      GEO_PROVIDER: mock
      PUSH_PROVIDER: mock
      PAYMENT_WEBHOOK_SECRET: dev-webhook-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pickly/database generate
      - run: pnpm -r --filter "./packages/*" build
      - run: pnpm --filter @pickly/database migrate:deploy
      - run: pnpm db:seed
      - run: pnpm --filter @pickly/e2e exec playwright install chromium --with-deps
      - run: pnpm --filter @pickly/e2e e2e
        env:
          CI: "true"

# النشر تلقائي على السيرفر نفسه عبر systemd timer (pickly-autodeploy) يسحب main
# كل دقيقتين ويعيد بناء الخدمات المتأثرة فقط — بلا أسرار على GitHub. لا وظيفة نشر هنا.
