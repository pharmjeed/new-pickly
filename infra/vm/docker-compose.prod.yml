# Pickly على سيرفر واحد (Oracle Always Free ARM أو أي VPS) — بيئة تطوير/عرض
# التشغيل: من جذر المستودع على السيرفر:
#   docker compose -f infra/vm/docker-compose.prod.yml up -d --build
# ملاحظة: APP_ENV=demo يُبقي بوابة الدفع التجريبية ورمز OTP الثابت — ليست بيئة إنتاج.

x-env: &app-env
  DATABASE_URL: postgresql://pickly:${DB_PASSWORD:-pickly_demo_2026}@postgres:5432/pickly
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:-demo-secret-change-me-please}
  # مهلة طويلة للعرض حتى لا تنتهي الجلسة أثناء الاستخدام (الإنتاج يقصّرها ويضيف refresh)
  JWT_ACCESS_TTL: 12h
  SMS_PROVIDER: mock
  PAYMENT_PROVIDER: mock
  PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-demo-webhook-secret}
  GEO_PROVIDER: mock
  PUSH_PROVIDER: mock
  OTP_DEV_FIXED_CODE: "1234"
  # development يُبقي مسارات بوابة الدفع التجريبية (/v1/dev/mock-gateway) شغالة للعرض
  NODE_ENV: development

services:
  postgres:
    # صورة PostGIS متعددة المعمارية (تدعم arm64 لسيرفرات Ampere) — postgis/postgis رسمية x86 فقط
    image: imresamu/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: pickly
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pickly_demo_2026}
      POSTGRES_DB: pickly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pickly"]
      interval: 5s
      retries: 20

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
      API_PORT: "4000"
      API_HOST: 0.0.0.0
      # مجلد التشغيل المشترك مع مضيف Docker — إشارة تحديث خريطة الملاحة وحالتها (السوبر أدمن)
      OPS_DIR: /ops
    volumes:
      # bind-mount مع المضيف: الـAPI يكتب nav-map.request ويقرأ nav-map.status.json فقط
      - /home/ubuntu/pickly-ops:/ops
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  # محرك المسارات الذاتي — خريطة السعودية معالَجة مسبقاً في volume osrmdata (MLD)
  # يخدم /route,/nearest,... على المنفذ 5000 داخلياً؛ العميل يصله عبر بروكسي /osrm
  osrm:
    # صورة ghcr متعددة المعمارية (تدعم arm64 لسيرفرات Ampere) — الرسمية osrm/osrm-backend x86 فقط
    image: ghcr.io/project-osrm/osrm-backend:latest
    restart: unless-stopped
    command: osrm-routed --algorithm mld --max-table-size 8000 /data/saudi.osrm
    volumes:
      - osrmdata:/data

  customer-web:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: customer-web, PORT: 3000, API_INTERNAL_URL: "http://api:4000", OSRM_INTERNAL_URL: "http://osrm:5000" }
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:4000
      OSRM_INTERNAL_URL: http://osrm:5000
      PORT: "3000"
    ports: ["3000:3000"]
    depends_on: [api, osrm]

  merchant-web:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: merchant-web, PORT: 3001, API_INTERNAL_URL: "http://api:4000" }
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:4000
      PORT: "3001"
    ports: ["3001:3001"]
    depends_on: [api]

  branch-ops:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: branch-ops, PORT: 3002, API_INTERNAL_URL: "http://api:4000" }
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:4000
      PORT: "3002"
    ports: ["3002:3002"]
    depends_on: [api]

  admin-web:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: admin-web, PORT: 3003, API_INTERNAL_URL: "http://api:4000" }
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:4000
      PORT: "3003"
    ports: ["3003:3003"]
    depends_on: [api]

  site:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: site, PORT: 3004 }
    restart: unless-stopped
    environment:
      PORT: "3004"
    ports: ["3004:3004"]

  # بوابة HTTPS — Caddy يصدر شهادات Let's Encrypt تلقائياً لأسماء sslip.io
  # (تحلّ كلها إلى 193.122.83.224). يلزم HTTPS كي يسمح المتصفح بتحديد الموقع.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      # الـCaddyfile مربوط bind-mount ولا يُعاد تحميله تلقائياً؛ غيّر هذا الرقم مع كل
      # تعديل عليه كي يعيد docker compose up -d إنشاء الحاوية فتقرأ الإعداد الجديد.
      CADDY_CONFIG_VERSION: "3"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on: [customer-web, merchant-web, branch-ops, admin-web, site]

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
  osrmdata:
