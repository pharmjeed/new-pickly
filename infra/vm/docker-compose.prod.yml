# Pickly على سيرفر واحد (Oracle Always Free ARM أو أي VPS) — بيئة تطوير/عرض
# التشغيل: من جذر المستودع على السيرفر:
#   docker compose -f infra/vm/docker-compose.prod.yml up -d --build
# ملاحظة: APP_ENV=demo يُبقي بوابة الدفع التجريبية ورمز OTP الثابت — ليست بيئة إنتاج.

x-env: &app-env
  DATABASE_URL: postgresql://pickly:${DB_PASSWORD:-pickly_demo_2026}@postgres:5432/pickly
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:-demo-secret-change-me-please}
  SMS_PROVIDER: mock
  PAYMENT_PROVIDER: mock
  PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-demo-webhook-secret}
  GEO_PROVIDER: mock
  PUSH_PROVIDER: mock
  OTP_DEV_FIXED_CODE: "1234"
  # development يُبقي مسارات بوابة الدفع التجريبية (/v1/dev/mock-gateway) شغالة للعرض
  NODE_ENV: development

services:
  postgres:
    # صورة PostGIS متعددة المعمارية (تدعم arm64 لسيرفرات Ampere) — postgis/postgis رسمية x86 فقط
    image: imresamu/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: pickly
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pickly_demo_2026}
      POSTGRES_DB: pickly
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pickly"]
      interval: 5s
      retries: 20

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redisdata:/data

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
      API_PORT: "4000"
      API_HOST: 0.0.0.0
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  customer-web:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: customer-web, PORT: 3000 }
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:4000
      PORT: "3000"
    ports: ["3000:3000"]
    depends_on: [api]

  merchant-web:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: merchant-web, PORT: 3001 }
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:4000
      PORT: "3001"
    ports: ["3001:3001"]
    depends_on: [api]

  branch-ops:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: branch-ops, PORT: 3002 }
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:4000
      PORT: "3002"
    ports: ["3002:3002"]
    depends_on: [api]

  admin-web:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: admin-web, PORT: 3003 }
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: http://api:4000
      PORT: "3003"
    ports: ["3003:3003"]
    depends_on: [api]

  site:
    build:
      context: ../..
      dockerfile: infra/vm/Dockerfile.web
      args: { APP: site, PORT: 3004 }
    restart: unless-stopped
    environment:
      PORT: "3004"
    ports: ["3004:3004"]

volumes:
  pgdata:
  redisdata:
