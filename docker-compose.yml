services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: pickly-postgres
    environment:
      POSTGRES_USER: pickly
      POSTGRES_PASSWORD: pickly_local
      POSTGRES_DB: pickly
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pickly"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pickly-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: pickly-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — رسائل OTP التجريبية تُعرض هنا
volumes:
  pgdata:
  redisdata:
