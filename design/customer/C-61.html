<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>C-61 · طرق الدفع — Pickly</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=IBM+Plex+Mono:wght@500&display=swap">
<link rel="stylesheet" href="../tokens.css">
<style>
*{box-sizing:border-box;margin:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--pk-font-body);background:var(--pk-bg);color:var(--pk-text);line-height:1.75;font-size:var(--pk-fs-15)}
a{color:var(--pk-lime-900);text-decoration:none}a:hover{color:var(--pk-ink-900)}
[data-theme="dark"] a{color:var(--pk-lime-300)}[data-theme="dark"] a:hover{color:var(--pk-lime-500)}
button{font-family:var(--pk-font-body)}
.mono{font-family:var(--pk-font-mono);direction:ltr;unicode-bidi:embed}
.disp{font-family:var(--pk-font-display)}
.muted{color:var(--pk-text-2)}
.row{display:flex;gap:10px;align-items:center}
.col{display:flex;flex-direction:column;gap:10px}
.wrap-r{flex-wrap:wrap}
.sb-a{justify-content:space-between}
.grow{flex:1;min-width:0}
.tc{text-align:center}
/* ===== شريط التعريف العلوي (خارج الشاشة — أداة مراجعة) ===== */
.pkmeta{position:sticky;top:0;z-index:999;background:var(--pk-ink-900);color:#B9C7BE;display:flex;align-items:center;gap:12px;padding:8px 16px;font-size:12px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.pkmeta .code{font-family:var(--pk-font-mono);background:var(--pk-lime-500);color:var(--pk-ink-900);border-radius:6px;padding:1px 10px;font-weight:500;letter-spacing:1px}
.pkmeta .ttl{color:#F4F7F2;font-weight:500;font-size:12.5px}
.pkmeta a{color:#8FA398;text-decoration:none;font-size:11.5px}
.pkmeta a:hover{color:#C9F339}
.pkmeta .nav{display:flex;gap:10px;align-items:center;border-inline-start:1px solid #2E4A3C;padding-inline-start:12px}
.pkmeta .states{display:flex;gap:6px;margin-inline-start:auto;flex-wrap:wrap;align-items:center}
.pkmeta .states .lb{font-size:10.5px;color:#6E7A72}
.stbtn{cursor:pointer;border:1px solid #2E4A3C;background:transparent;color:#B9C7BE;border-radius:99px;padding:2px 12px;font-size:11.5px;font-family:inherit}
.stbtn.on{background:#C9F339;color:#10241B;border-color:#C9F339;font-weight:500}
/* ===== الأزرار ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--pk-font-body);font-size:var(--pk-fs-15);font-weight:500;min-height:48px;padding:0 22px;border-radius:var(--pk-radius);border:none;cursor:pointer;background:var(--pk-lime-500);color:var(--pk-ink-900);transition:background var(--pk-dur) var(--pk-ease);text-decoration:none}
.btn:hover{background:var(--pk-lime-300);color:var(--pk-ink-900)}
.btn.sec2{background:transparent;border:1.5px solid var(--pk-ink-900);color:var(--pk-text)}
[data-theme="dark"] .btn.sec2{border-color:var(--pk-cloud)}
.btn.ghost{background:transparent;color:var(--pk-lime-900)}
[data-theme="dark"] .btn.ghost{color:var(--pk-lime-300)}
.btn.danger{background:var(--pk-error);color:#fff}
.btn.dgh{background:transparent;color:var(--pk-error)}
.btn.dark{background:var(--pk-ink-900);color:var(--pk-lime-500)}
.btn.dis{background:var(--pk-line);color:var(--pk-gray);cursor:not-allowed}
[data-theme="dark"] .btn.dis{background:var(--pk-ink-600);color:var(--pk-gray-2)}
.btn.xl{min-height:var(--pk-touch-branch);font-size:var(--pk-fs-b-min);font-weight:700;padding:0 28px;border-radius:14px}
.btn.sm{min-height:34px;font-size:var(--pk-fs-13);padding:0 14px;border-radius:9px;font-weight:400}
.btn.blk{width:100%}
/* ===== الشارات ===== */
.badge{display:inline-flex;align-items:center;gap:6px;border-radius:var(--pk-radius-pill);padding:3px 12px;font-size:var(--pk-fs-12);font-weight:500;white-space:nowrap}
.b-ok{background:var(--pk-success);color:#fff}
.b-warn{background:var(--pk-warn);color:#412402}
.b-err{background:var(--pk-error);color:#fff}
.b-lime{background:var(--pk-lime-100);color:var(--pk-lime-900)}
.b-soft{background:var(--pk-cloud);color:var(--pk-gray);border:1px solid var(--pk-line)}
[data-theme="dark"] .b-soft{background:var(--pk-ink-600);color:var(--pk-gray-2);border-color:var(--pk-ink-600)}
.b-ink{background:var(--pk-ink-900);color:var(--pk-lime-500)}
[data-theme="dark"] .b-ink{background:var(--pk-cloud);color:var(--pk-ink-900)}
.b-out-ok{border:1.5px solid var(--pk-success);color:var(--pk-success);background:var(--pk-st-done-bg)}
.b-out-err{border:1.5px solid var(--pk-error);color:var(--pk-error);background:var(--pk-st-overdue-bg)}
.p-new{background:var(--pk-st-new-bg);color:var(--pk-st-new);border:1.5px solid var(--pk-st-new)}
.p-prep{background:var(--pk-st-prep-bg);color:var(--pk-st-prep);border:1.5px solid var(--pk-st-prep)}
[data-theme="dark"] .p-prep{color:var(--pk-gray-2)}
.p-near{background:var(--pk-st-near-bg);color:var(--pk-lime-900);border:1.5px solid var(--pk-st-near)}
.p-arr{background:var(--pk-st-arrived-bg);color:#8A5A0E;border:1.5px solid var(--pk-st-arrived)}
[data-theme="dark"] .p-arr{color:var(--pk-warn)}
.p-over{background:var(--pk-st-overdue-bg);color:var(--pk-st-overdue);border:1.5px solid var(--pk-st-overdue)}
.p-done{background:var(--pk-st-done-bg);color:var(--pk-st-done);border:1.5px solid var(--pk-st-done)}
.dot-l{width:9px;height:9px;border-radius:50%;background:var(--pk-lime-500);display:inline-block;animation:pkpulse 1.6s var(--pk-ease) infinite}
@keyframes pkpulse{0%,100%{box-shadow:0 0 0 0 rgba(201,243,57,.5)}50%{box-shadow:0 0 0 7px rgba(201,243,57,0)}}
/* ===== الصور البديلة ===== */
.ph{background:repeating-linear-gradient(-45deg,#EDF2EC 0 14px,#E4EBE4 14px 28px);display:flex;align-items:center;justify-content:center;color:var(--pk-gray);font-family:var(--pk-font-mono);font-size:10px;letter-spacing:.4px;overflow:hidden}
.ph.dark{background:repeating-linear-gradient(-45deg,#1C3329 0 14px,#22392E 14px 28px);color:#8FA398}
.ph.lime{background:repeating-linear-gradient(-45deg,#F2FCD1 0 14px,#EAF7C0 14px 28px);color:#5E7A12}
/* ===== البطاقات ===== */
.card{background:var(--pk-surface);border:1px solid var(--pk-border);border-radius:var(--pk-radius-lg);padding:16px}
.card.flat{border-radius:var(--pk-radius)}
.hr{border:none;border-top:1px solid var(--pk-border);margin:12px 0}
.hr.dash{border-top-style:dashed}
/* ===== الحقول ===== */
.fld{display:flex;flex-direction:column;gap:6px}
.fld label{font-size:var(--pk-fs-13);font-weight:500;color:var(--pk-text)}
.fld input,.fld textarea,.fld select,.inp{font-family:var(--pk-font-body);font-size:var(--pk-fs-15);color:var(--pk-text);background:var(--pk-surface);border:1.5px solid var(--pk-border);border-radius:var(--pk-radius);min-height:48px;padding:10px 14px;outline:none;width:100%}
.fld textarea{min-height:88px;line-height:1.7}
.fld input:focus,.fld textarea:focus,.inp:focus{border-color:var(--pk-ink-900)}
[data-theme="dark"] .fld input:focus,[data-theme="dark"] .inp:focus{border-color:var(--pk-lime-500)}
.fld .hint{font-size:var(--pk-fs-12);color:var(--pk-text-2)}
.fld.err input,.fld.err textarea{border-color:var(--pk-error)}
.fld.err .hint{color:var(--pk-error)}
.otp{display:flex;gap:8px;direction:ltr;justify-content:center}
.otp input{width:44px;height:54px;text-align:center;font-family:var(--pk-font-mono);font-size:var(--pk-fs-24);border:1.5px solid var(--pk-border);border-radius:var(--pk-radius);background:var(--pk-surface);color:var(--pk-text);outline:none}
.otp input.f{border-color:var(--pk-ink-900);background:var(--pk-lime-100)}
.otp.err input{border-color:var(--pk-error)}
.search{display:flex;align-items:center;gap:10px;background:var(--pk-surface);border:1.5px solid var(--pk-border);border-radius:var(--pk-radius-pill);min-height:46px;padding:0 16px;color:var(--pk-text-2);font-size:var(--pk-fs-14)}
.switch{width:46px;height:28px;border-radius:99px;background:var(--pk-line);position:relative;cursor:pointer;flex-shrink:0;border:none;padding:0}
.switch:after{content:"";position:absolute;top:3px;inset-inline-start:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:transform var(--pk-dur) var(--pk-ease);box-shadow:var(--pk-shadow-1)}
.switch.on{background:var(--pk-success)}
.switch.on:after{transform:translateX(-18px)}
[data-theme="dark"] .switch{background:var(--pk-ink-600)}
[data-theme="dark"] .switch.on{background:var(--pk-success)}
.radio,.chk{width:22px;height:22px;border:2px solid var(--pk-border);border-radius:50%;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:var(--pk-surface)}
.chk{border-radius:7px}
.radio.on{border-color:var(--pk-ink-900)}
.radio.on:after{content:"";width:11px;height:11px;border-radius:50%;background:var(--pk-ink-900)}
[data-theme="dark"] .radio.on{border-color:var(--pk-lime-500)}
[data-theme="dark"] .radio.on:after{background:var(--pk-lime-500)}
.chk.on{background:var(--pk-ink-900);border-color:var(--pk-ink-900);color:var(--pk-lime-500);font-size:13px;font-weight:700}
.chk.on:after{content:"✓"}
/* ===== عناصر مساعدة ===== */
.qty{display:inline-flex;align-items:center;border:1.5px solid var(--pk-border);border-radius:var(--pk-radius-pill);overflow:hidden;background:var(--pk-surface)}
.qty button{width:38px;height:38px;border:none;background:transparent;font-size:17px;cursor:pointer;color:var(--pk-text)}
.qty span{min-width:32px;text-align:center;font-family:var(--pk-font-mono);font-weight:500}
.seg{display:inline-flex;background:var(--pk-cloud);border:1px solid var(--pk-line);border-radius:var(--pk-radius-pill);padding:3px;gap:2px;max-width:100%;overflow-x:auto}
[data-theme="dark"] .seg{background:var(--pk-ink-900);border-color:var(--pk-ink-600)}
.seg button,.seg a{border:none;background:transparent;font-family:var(--pk-font-body);font-size:var(--pk-fs-13);padding:6px 16px;border-radius:99px;cursor:pointer;color:var(--pk-gray);white-space:nowrap;text-decoration:none}
.seg .on{background:var(--pk-ink-900);color:var(--pk-lime-500);font-weight:500}
[data-theme="dark"] .seg .on{background:var(--pk-lime-500);color:var(--pk-ink-900)}
.count{display:inline-flex;align-items:center;gap:10px;background:var(--pk-ink-900);color:#fff;border-radius:var(--pk-radius-pill);padding:6px 18px}
.count .t{font-family:var(--pk-font-mono);font-size:var(--pk-fs-20);color:var(--pk-lime-500);direction:ltr}
.timerbar{height:8px;border-radius:99px;background:var(--pk-line);overflow:hidden}
[data-theme="dark"] .timerbar{background:var(--pk-ink-600)}
.timerbar i{display:block;height:100%;background:var(--pk-warn);border-radius:99px}
.note{display:flex;gap:10px;align-items:flex-start;border-radius:var(--pk-radius);padding:11px 14px;font-size:var(--pk-fs-13);line-height:1.7}
.note.info{background:var(--pk-lime-100);color:var(--pk-lime-900)}
.note.warn{background:var(--pk-st-arrived-bg);color:#8A5A0E}
[data-theme="dark"] .note.warn{color:var(--pk-warn)}
.note.err{background:var(--pk-st-overdue-bg);color:var(--pk-error)}
.note.ok{background:var(--pk-st-done-bg);color:var(--pk-success)}
.note.soft{background:var(--pk-cloud);color:var(--pk-text-2);border:1px solid var(--pk-border)}
[data-theme="dark"] .note.info{background:var(--pk-ink-600);color:var(--pk-lime-300)}
[data-theme="dark"] .note.soft{background:var(--pk-ink-700);color:var(--pk-gray-2);border-color:var(--pk-ink-600)}
.toast{display:inline-flex;align-items:center;gap:10px;background:var(--pk-ink-900);color:var(--pk-cloud);border-radius:var(--pk-radius);padding:11px 16px;font-size:var(--pk-fs-13);box-shadow:var(--pk-shadow-2)}
.toast.ok{border-inline-start:4px solid var(--pk-success)}
.toast.err{border-inline-start:4px solid var(--pk-error)}
/* ===== اللوحة ===== */
.plate{font-family:var(--pk-font-mono);font-weight:500;direction:ltr;display:inline-flex;align-items:stretch;border:2px solid var(--pk-ink-900);border-radius:8px;overflow:hidden;background:#fff;color:var(--pk-ink-900);flex-shrink:0}
.plate .no{padding:1px 10px;font-size:var(--pk-fs-15);letter-spacing:2px;display:flex;align-items:center}
.plate .ar{background:var(--pk-ink-900);color:var(--pk-lime-500);padding:1px 8px;font-size:11px;letter-spacing:2px;display:flex;align-items:center}
.plate.big .no{font-size:var(--pk-fs-b-plate);padding:2px 18px;letter-spacing:6px;font-weight:700}
.plate.big .ar{font-size:var(--pk-fs-20);padding:2px 12px}
.plate.md .no{font-size:var(--pk-fs-24);padding:2px 12px;letter-spacing:4px;font-weight:700}
.plate.md .ar{font-size:var(--pk-fs-13)}
/* ===== شريط الحالات ٧ ===== */
.steps7{display:flex;width:100%}
.steps7 .s{flex:1;text-align:center;position:relative}
.steps7 .dot{width:20px;height:20px;border-radius:50%;background:var(--pk-line);margin:0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;position:relative;z-index:1}
[data-theme="dark"] .steps7 .dot{background:var(--pk-ink-600)}
.steps7 .s:not(:last-child):after{content:"";position:absolute;top:9px;inset-inline-start:calc(50% + 10px);width:calc(100% - 20px);height:3px;background:var(--pk-line)}
[data-theme="dark"] .steps7 .s:not(:last-child):after{background:var(--pk-ink-600)}
.steps7 .s.done .dot,.steps7 .s.done:after{background:var(--pk-success)}
.steps7 .s.cur .dot{background:var(--pk-lime-500);outline:4px solid var(--pk-lime-100);color:var(--pk-ink-900)}
[data-theme="dark"] .steps7 .s.cur .dot{outline-color:var(--pk-ink-600)}
.steps7 .lb{font-size:9.5px;margin-top:6px;color:var(--pk-text-2);line-height:1.45}
.steps7 .s.cur .lb{color:var(--pk-text);font-weight:700}
.steps7 .s.done .lb{color:var(--pk-success)}
/* ===== رمز الاستلام ===== */
.pucode{background:var(--pk-ink-900);border-radius:var(--pk-radius-lg);padding:20px;text-align:center}
.pucode .lbl{color:#8FA398;font-size:var(--pk-fs-13);margin-bottom:6px}
.pucode .code{font-family:var(--pk-font-mono);font-size:42px;font-weight:500;color:var(--pk-lime-500);letter-spacing:14px;direction:ltr;padding-inline-start:14px;line-height:1.3}
.qr{background:#fff;border-radius:12px;padding:8px;display:inline-block;line-height:0}
/* ===== الحالات الفارغة ===== */
.empty{text-align:center;padding:34px 20px;display:flex;flex-direction:column;align-items:center;gap:4px}
.empty .ic{width:72px;height:72px;border-radius:22px;background:var(--pk-cloud);border:1px solid var(--pk-line);display:flex;align-items:center;justify-content:center;margin-bottom:10px;color:var(--pk-gray)}
[data-theme="dark"] .empty .ic{background:var(--pk-ink-700);border-color:var(--pk-ink-600);color:var(--pk-gray-2)}
.empty b{font-family:var(--pk-font-display);font-size:var(--pk-fs-17);font-weight:700}
.empty p{font-size:var(--pk-fs-13);color:var(--pk-text-2);margin:2px 0 12px;max-width:260px}
/* ===== الجداول ===== */
.tbl{width:100%;border-collapse:collapse;font-size:var(--pk-fs-13);background:var(--pk-surface)}
.tbl th{color:var(--pk-text-2);font-weight:500;font-size:var(--pk-fs-12);text-align:right;padding:9px 12px;border-bottom:1px solid var(--pk-border);background:var(--pk-bg);white-space:nowrap}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--pk-border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--pk-bg)}
.tblwrap{border:1px solid var(--pk-border);border-radius:var(--pk-radius);overflow:auto;background:var(--pk-surface)}
/* ===== صفوف قوائم ===== */
.lrow{display:flex;align-items:center;gap:12px;padding:13px 4px;border-bottom:1px solid var(--pk-border);color:var(--pk-text);text-decoration:none;min-height:var(--pk-touch)}
.lrow:last-child{border-bottom:none}
.lrow .ic{width:38px;height:38px;border-radius:12px;background:var(--pk-cloud);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--pk-ink-600)}
[data-theme="dark"] .lrow .ic{background:var(--pk-ink-600);color:var(--pk-gray-2)}
.lrow .t{font-weight:500;font-size:var(--pk-fs-14)}
.lrow .d{font-size:var(--pk-fs-12);color:var(--pk-text-2)}
.lrow .chev{margin-inline-start:auto;color:var(--pk-gray);flex-shrink:0;transform:scaleX(-1)}
.srow{display:flex;justify-content:space-between;font-size:var(--pk-fs-14);padding:3px 0}
.srow .v{font-family:var(--pk-font-mono)}
.srow.tot{font-weight:700;font-size:var(--pk-fs-16);border-top:1px dashed var(--pk-border);margin-top:8px;padding-top:10px}
.kv{display:flex;justify-content:space-between;gap:12px;font-size:var(--pk-fs-13);padding:6px 0;border-bottom:1px dashed var(--pk-border)}
.kv:last-child{border-bottom:none}
.kv .k{color:var(--pk-text-2);flex-shrink:0}
.kv .v{text-align:left}
/* ===== مؤشر التحميل ===== */
.loader3 rect{fill:var(--pk-lime-500)}
.skl{background:linear-gradient(90deg,var(--pk-cloud) 25%,#EBF0EA 50%,var(--pk-cloud) 75%);background-size:200% 100%;animation:skl 1.4s infinite;border-radius:10px}
@keyframes skl{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* عدة الهاتف — تطبيق العميل 390px */
.stage{display:flex;justify-content:center;padding:26px 14px 70px}
.phone{width:390px;max-width:100%;background:var(--pk-white);border:1px solid var(--pk-line);border-radius:38px;overflow:hidden;box-shadow:var(--pk-shadow-2);min-height:844px;display:flex;flex-direction:column;position:relative}
.phone.dark{background:var(--pk-ink-900);color:var(--pk-cloud)}
.scr{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.sb{display:flex;justify-content:space-between;align-items:center;padding:14px 26px 8px;font-family:var(--pk-font-mono);font-size:13.5px;font-weight:500;flex-shrink:0}
.sb .ic{display:flex;gap:5px;align-items:center}
.sb .bat{width:22px;height:11px;border:1.5px solid currentColor;border-radius:3.5px;position:relative;opacity:.9}
.sb .bat:after{content:"";position:absolute;inset:1.5px;background:currentColor;border-radius:1.5px;width:70%}
.sb .sig{display:flex;gap:1.5px;align-items:flex-end}
.sb .sig i{width:3px;background:currentColor;border-radius:1px;display:block}
.homebar{height:5px;width:120px;border-radius:99px;background:var(--pk-ink-900);opacity:.25;margin:6px auto 8px;flex-shrink:0}
.phone.dark .homebar{background:#fff;opacity:.4}
.body{flex:1;overflow-y:auto;padding:4px 18px 18px;display:flex;flex-direction:column;gap:14px;scrollbar-width:thin}
.body.center{justify-content:center;align-items:center;text-align:center}
.body.nopad{padding:0}
/* رأس رجوع */
.bhead{display:flex;align-items:center;gap:10px;padding:8px 18px 4px;flex-shrink:0}
.bhead .bk{width:38px;height:38px;border-radius:12px;border:1px solid var(--pk-border);background:var(--pk-surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--pk-text);flex-shrink:0}
.bhead h1{font-family:var(--pk-font-display);font-size:var(--pk-fs-20);font-weight:700;flex:1}
.bhead .act{margin-inline-start:auto;flex-shrink:0}
/* رأس الرئيسية */
.apphead{padding:6px 18px 0;display:flex;flex-direction:column;gap:12px;flex-shrink:0}
.loc{display:flex;align-items:center;gap:8px;font-size:var(--pk-fs-13)}
.loc b{font-weight:700;font-size:var(--pk-fs-14)}
.loc .lb{color:var(--pk-text-2);font-size:var(--pk-fs-12)}
.loc .bell{margin-inline-start:auto;width:40px;height:40px;border-radius:13px;border:1px solid var(--pk-border);display:flex;align-items:center;justify-content:center;position:relative;color:var(--pk-text)}
.loc .bell .dt{position:absolute;top:9px;inset-inline-end:10px;width:8px;height:8px;border-radius:50%;background:var(--pk-error);border:1.5px solid #fff}
/* تمرير أفقي */
.hs{display:flex;gap:10px;overflow-x:auto;padding:2px 18px 6px;margin:0 -18px;scrollbar-width:none}
.hs::-webkit-scrollbar{display:none}
.hs>*{flex-shrink:0}
.cat{display:flex;flex-direction:column;align-items:center;gap:6px;width:64px;text-decoration:none;color:var(--pk-text)}
.cat .ic{width:56px;height:56px;border-radius:18px;background:var(--pk-cloud);border:1px solid var(--pk-line);display:flex;align-items:center;justify-content:center;color:var(--pk-ink-600)}
.cat.on .ic{background:var(--pk-lime-100);border-color:var(--pk-lime-500);color:var(--pk-lime-900)}
.cat span{font-size:11px}
/* عناوين أقسام */
.sech{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:-4px}
.sech h2{font-family:var(--pk-font-display);font-size:var(--pk-fs-17);font-weight:700}
.sech a{font-size:var(--pk-fs-12);color:var(--pk-lime-900)}
/* بطاقة مطعم كاملة */
.rcard{background:var(--pk-surface);border:1px solid var(--pk-border);border-radius:var(--pk-radius-lg);overflow:hidden;display:block;color:var(--pk-text);text-decoration:none}
.rcard .img{height:132px;position:relative}
.rcard .bd{padding:12px 14px 14px}
.rcard .nm{display:flex;justify-content:space-between;align-items:center;gap:8px}
.rcard .nm b{font-family:var(--pk-font-display);font-size:var(--pk-fs-16);font-weight:700}
.rate{display:inline-flex;align-items:center;gap:4px;font-size:var(--pk-fs-12);font-weight:500;flex-shrink:0}
.meta-r{display:flex;gap:10px;color:var(--pk-text-2);font-size:var(--pk-fs-12);margin-top:5px;flex-wrap:wrap}
.meta-r span{display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.car-line{margin-top:9px;background:var(--pk-lime-100);color:var(--pk-lime-900);border-radius:9px;padding:5px 10px;font-size:var(--pk-fs-12);display:flex;align-items:center;gap:7px}
.foot-r{display:flex;gap:8px;margin-top:8px;font-size:11.5px;color:var(--pk-text-2);flex-wrap:wrap}
/* بطاقة مطعم مصغرة أفقية */
.rmini{width:200px;background:var(--pk-surface);border:1px solid var(--pk-border);border-radius:16px;overflow:hidden;text-decoration:none;color:var(--pk-text);display:block}
.rmini .img{height:86px;position:relative}
.rmini .bd{padding:9px 12px 11px}
.rmini b{font-size:var(--pk-fs-13);font-weight:700;display:block}
.rmini .m{font-size:11px;color:var(--pk-text-2);display:flex;gap:8px;margin-top:3px}
/* بطاقة منتج صف */
.pcard{background:var(--pk-surface);border:1px solid var(--pk-border);border-radius:16px;padding:10px;display:flex;gap:11px}
.pcard .img{width:82px;height:82px;border-radius:12px;flex-shrink:0}
.pcard .t{font-weight:500;font-size:var(--pk-fs-14);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.pcard .d{font-size:11.5px;color:var(--pk-text-2);line-height:1.55;margin:2px 0 4px}
.pcard.na{opacity:.55}
.price{font-family:var(--pk-font-mono);font-size:var(--pk-fs-13);font-weight:500;white-space:nowrap}
.price .old{color:var(--pk-text-2);text-decoration:line-through;font-size:11px;margin-inline-start:5px}
.addbtn{width:32px;height:32px;border-radius:10px;background:var(--pk-lime-500);border:none;font-size:19px;line-height:1;cursor:pointer;color:var(--pk-ink-900);margin-inline-start:auto;align-self:flex-end;flex-shrink:0}
/* سيارة */
.vcard{display:flex;align-items:center;gap:11px;background:var(--pk-surface);border:1.5px solid var(--pk-border);border-radius:16px;padding:12px 14px;cursor:pointer}
.vcard.sel{border-color:var(--pk-ink-900);background:var(--pk-lime-100)}
.vic{width:44px;height:44px;border-radius:12px;background:var(--pk-cloud);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--pk-ink-600)}
.vcard .t{font-weight:500;font-size:var(--pk-fs-14)}
.vcard .sub{font-size:var(--pk-fs-12);color:var(--pk-text-2)}
/* شريط الطلب النشط العائم */
.livebar{position:absolute;bottom:76px;inset-inline:14px;display:flex;align-items:center;gap:11px;background:var(--pk-ink-900);color:var(--pk-cloud);border-radius:16px;padding:11px 14px;box-shadow:var(--pk-shadow-2);cursor:pointer;z-index:20}
.livebar.static{position:static;inset-inline:auto}
.livebar .st{font-size:11.5px;color:#8FA398}
.livebar .t{font-weight:500;font-size:var(--pk-fs-13)}
.livebar .eta{margin-inline-start:auto;font-family:var(--pk-font-mono);color:var(--pk-lime-500);font-size:var(--pk-fs-12);direction:ltr;text-align:left;line-height:1.5}
/* تنقل سفلي */
.tabbar{display:flex;background:var(--pk-surface);border-top:1px solid var(--pk-border);flex-shrink:0;padding-bottom:2px}
.tabbar a{flex:1;text-align:center;padding:9px 0 6px;font-size:10.5px;color:var(--pk-gray);text-decoration:none;display:flex;flex-direction:column;gap:3px;align-items:center;min-height:var(--pk-touch)}
.tabbar a.on{color:var(--pk-ink-900);font-weight:700}
/* شريط سفلي ثابت (CTA) */
.footbar{padding:12px 18px;border-top:1px solid var(--pk-border);background:var(--pk-surface);display:flex;gap:10px;align-items:center;flex-shrink:0}
/* خريطة بديلة */
.mapph{position:relative;background:#E9EFE7;overflow:hidden}
.mapph .rd{position:absolute;background:#fff;border-radius:99px}
.mapph .rd.h{height:14px}
.mapph .rd.v{width:14px}
.mapph .lbl{position:absolute;font-family:var(--pk-font-mono);font-size:9.5px;color:var(--pk-gray);background:rgba(255,255,255,.7);border-radius:6px;padding:1px 7px}
.pin{position:absolute;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;gap:2px}
.pin .bx{background:var(--pk-ink-900);color:var(--pk-lime-500);font-size:10.5px;font-weight:500;border-radius:8px;padding:3px 9px;white-space:nowrap;font-family:var(--pk-font-mono);direction:ltr}
.pin .tip{width:10px;height:10px;background:var(--pk-ink-900);transform:rotate(45deg);margin-top:-7px}
.pin.lime .bx{background:var(--pk-lime-500);color:var(--pk-ink-900)}
.pin.lime .tip{background:var(--pk-lime-500)}
.medot{position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;border:4px solid var(--pk-ink-900);transform:translate(-50%,-50%)}
.medot:after{content:"";position:absolute;inset:-12px;border-radius:50%;border:2px solid rgba(16,36,27,.2);animation:pkpulse 2s infinite}
/* ورقة سفلية */
.sheet{background:var(--pk-surface);border:1px solid var(--pk-border);border-radius:24px 24px 0 0;padding:10px 18px 18px;margin-top:auto;box-shadow:var(--pk-shadow-2)}
.sheet .grab{width:44px;height:5px;border-radius:99px;background:var(--pk-line);margin:2px auto 12px}
.dim{background:rgba(16,36,27,.45);position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;justify-content:flex-end}
.dim .sheet{margin:0;border-radius:24px 24px 0 0}
.dim.mid{justify-content:center;padding:24px}
.dim.mid .modal{background:var(--pk-surface);border-radius:20px;padding:22px 20px;text-align:center}
/* بانر */
.banner{background:var(--pk-ink-900);color:var(--pk-cloud);border-radius:var(--pk-radius-lg);padding:16px 18px;position:relative;overflow:hidden}
.banner .l3{position:absolute;inset-inline-start:-8px;bottom:-6px;opacity:.9}
.banner b{font-family:var(--pk-font-display);font-size:var(--pk-fs-17);font-weight:700;color:var(--pk-lime-500)}
.banner p{font-size:var(--pk-fs-12);color:#B9C7BE;margin-top:2px}
/* نجوم تقييم */
.stars{display:inline-flex;gap:6px;direction:ltr}
.stars svg{color:var(--pk-line);cursor:pointer}
.stars svg.on{color:var(--pk-warn)}
/* صف خيار (radio/check) */
.optrow{display:flex;align-items:center;gap:11px;padding:12px 2px;border-bottom:1px solid var(--pk-border);min-height:var(--pk-touch);cursor:pointer}
.optrow:last-child{border-bottom:none}
.optrow .t{font-size:var(--pk-fs-14);flex:1}
.optrow .p{font-family:var(--pk-font-mono);font-size:var(--pk-fs-12);color:var(--pk-text-2)}
/* شرائح فلاتر */
.fchips{display:flex;gap:8px;flex-wrap:wrap}
.fchip{border:1.5px solid var(--pk-border);background:var(--pk-surface);border-radius:99px;padding:7px 16px;font-size:var(--pk-fs-13);cursor:pointer;color:var(--pk-text);font-family:var(--pk-font-body)}
.fchip.on{background:var(--pk-ink-900);color:var(--pk-lime-500);border-color:var(--pk-ink-900)}
/* أيقونة كبيرة دائرية */
.bigic{width:96px;height:96px;border-radius:30px;background:var(--pk-lime-100);display:flex;align-items:center;justify-content:center;color:var(--pk-lime-900);margin:0 auto}
.dots{display:flex;gap:7px;justify-content:center}
.dots i{width:8px;height:8px;border-radius:99px;background:var(--pk-line)}
.dots i.on{width:24px;background:var(--pk-lime-500)}
h1.big{font-family:var(--pk-font-display);font-size:var(--pk-fs-24);font-weight:700;line-height:1.5}
.skl-card{height:120px}



/* v3.1 — مبدّل الشاشات المنطقية */
.pkview{display:contents}
.pkview.off{display:none}
.lstates{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center;padding:12px 16px 0;font-size:11px;color:var(--pk-gray)}
.lstates .stbtn{border:1px solid var(--pk-line);background:var(--pk-surface);color:var(--pk-gray)}
.lstates .stbtn.on{background:var(--pk-ink-900);color:var(--pk-lime-500);border-color:var(--pk-ink-900);font-weight:500}
.pkmeta .code.p{background:var(--pk-ink-600);color:var(--pk-lime-300)}
.pkmeta .p2tag{background:var(--pk-warn);color:#412402;border-radius:99px;padding:1px 10px;font-size:10.5px;font-weight:500;white-space:nowrap}
.vwbtn{border-color:#3C5648}
</style>

<script>function pkSt(s,btn){var scope=(btn&&btn.closest)?(btn.closest('.pkview')||document):document;scope.querySelectorAll('[data-state]').forEach(function(e){var l=e.getAttribute('data-state').split('|');e.style.display=l.indexOf(s)>-1?'':'none'});scope.querySelectorAll('.stbtn[data-s]').forEach(function(x){x.classList.toggle('on',x.getAttribute('data-s')===s)});}
function pkView(v,push){document.querySelectorAll('.pkview').forEach(function(e){e.classList.toggle('off',e.getAttribute('data-view')!==v)});document.querySelectorAll('.vwbtn').forEach(function(b){b.classList.toggle('on',b.getAttribute('data-v')===v)});var vv=document.querySelector('.pkview[data-view="'+v+'"]');if(vv){var fb=vv.querySelector('.lstates .stbtn');if(fb)pkSt(fb.getAttribute('data-s'),fb);}if(push!==false&&history.replaceState)history.replaceState(null,'','#'+v);}
function pkTheme(){var h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'':'dark');}
document.addEventListener('DOMContentLoaded',function(){var first=document.querySelector('.vwbtn');if(first){var v=location.hash.replace('#','');var ok=v&&document.querySelector('.vwbtn[data-v="'+v+'"]');pkView(ok?v:first.getAttribute('data-v'),false);}else{var fb=document.querySelector('.pkmeta .stbtn');if(fb)pkSt(fb.getAttribute('data-s'),fb);}});
window.addEventListener('hashchange',function(){var v=location.hash.replace('#','');if(document.querySelector('.pkview[data-view="'+v+'"]'))pkView(v,false);});</script>
